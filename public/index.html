<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="bvpjoV7apAah9sWyaIpsr1SnF01xaBYJ4Mzz_JMGcGU" />
    <title>Weather Dashboard SS | Precise 36-Hour Weather Forecast</title>
    <meta name="description" content="Get a highly accurate 36-hour weather forecast with Weather Dashboard SS. Real-time global updates and city tracking for professional weather analysis.">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:italic,wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* Global Reset to prevent shifting and scrolling */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: space-between; /* Keeps content spaced without overflow */
            width: 100vw;
            height: 100vh; /* Lock height to viewport */
            overflow: hidden; /* No scrolling */
            font-family: 'Poppins', sans-serif;
            background-color: WhiteSmoke;
        }

        /* Container to manage flow without scrolling */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px;
        }

        h1 {
            margin: 10px 0;
            font-size: 1.5rem;
            color: DarkSlateGrey;
        }

        /* Centered Search Box */
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            width: 100%;
        }

        input {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid Gray;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            background-color: RoyalBlue;
            color: White;
            border: none;
            border-radius: 5px;
        }

        /* Weather result styling */
        #weather {
            min-height: 50px;
            margin: 10px 0;
            font-weight: 600;
        }

        /* Canvas for Weather Visualization (e.g., Temperature Graph) */
        #weatherCanvas {
            background-color: White;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 90%;
            height: 150px; /* Smaller height to prevent scroll */
        }

        /* Heading - replaced hex with Coral */
        h2 {
            color: Coral; 
            margin: 15px 0 5px 0;
            font-size: 1.5rem;
        }

        /* Description - replaced hex with BlueViolet */
        .forecast-desc {
            color: BlueViolet; 
            font-weight: 300;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        /* Forecast Grid Centering */
        #forecast {
            display: flex;
            flex-wrap: nowrap; /* Prevent wrap to keep everything on one line/screen */
            overflow-x: auto; /* Allow horizontal scroll only if cards overflow */
            justify-content: center; 
            gap: 10px;
            width: 100%;
            max-width: 1000px;
            padding-bottom: 10px;
        }

        /* Classy Footer */
        footer {
            padding: 15px 0;
            background-color: GhostWhite;
            width: 100%;
            text-align: center;
            border-top: 1px solid LightGray;
        }

        .footer-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: Black;
            font-size: 1rem;
            margin: 0;
        }

        .copyright-year {
            color: DimGray;
            font-size: 0.7rem;
            margin: 2px 0 0 0;
        }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Weather Dashboard SS",
      "operatingSystem": "WEB",
      "applicationCategory": "WeatherApplication",
      "featureList": "36-hour detailed weather forecasting, global city search"
    }
    </script>
</head>
<body>

    <div class="main-container">
        <h1>🌍 Weather Dashboard SS</h1>

        <div class="search-box">
            <input type="text" id="city" placeholder="Enter city name">
            <button onclick="getWeather()">Search</button>
            <button onclick="getLocationWeather()">📍 My Location</button>
        </div>

        <div id="weather">Waiting for location...</div>

        <canvas id="weatherCanvas" width="800" height="150"></canvas>

        <h2>Next 36 Hours</h2>
        <p class="forecast-desc">Detailed hour-by-hour atmospheric changes.</p>
        
        <div id="forecast">
            </div>
    </div>

    <footer>
        <p class="footer-text">© Weather Dashboard by Shoubhya Sinha</p>
        <p class="copyright-year">2026 | Professional Edition</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Placeholder logic to initialize the canvas
        const canvas = document.getElementById('weatherCanvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "SlateBlue";
        ctx.font = "16px Poppins";
        ctx.fillText("Weather Trend Visualization will appear here", 230, 85);
    </script>
</body>
</html>
