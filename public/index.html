<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <title>Weather Dashboard SS | Global Forecast</title>
    <meta name="description" content="Get real-time weather updates and a 36-hour forecast for any city worldwide with Weather Dashboard SS.">
    <meta name="keywords" content="weather, forecast, global weather, 36-hour forecast, weather dashboard">
    <meta name="author" content="Shoubhya Sinha">

    <meta name="google-site-verification" content="bvpjoV7apAah9sWyaIpsr1SnF01xaBYJ4Mzz_JMGcGU" />

    <meta property="og:type" content="website">
    <meta property="og:title" content="Weather Dashboard SS (All Across the Globe)">
    <meta property="og:description" content="Precise 36-hour weather analysis and real-time tracking.">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* Responsive Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        /* Responsive Container */
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: clamp(1.5rem, 5vw, 2.5rem); /* Responsive font size */
            color: #1a73e8;
        }

        /* Search Box Responsive Layout */
        .search-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            min-width: 200px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background-color: #1a73e8;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #1557b0;
        }

        /* Main Weather Display */
        #weather {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
            color: #555;
        }

        /* Forecast Grid: Changes from 4 columns to 1 depending on screen size */
        #forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }

        .forecast-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .search-box {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <h1>🌍 Weather Dashboard SS (All Across the Globe)</h1>

    <div class="search-box">
        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="getWeather()">Search</button>
        <button onclick="getLocationWeather()">📍 My Location</button>
    </div>

    <div id="weather">
        <p>Enter a city or use your location to see current weather details.</p>
    </div>

    <h2>Next 36 Hours</h2>
    
    <div id="forecast">
        </div>

    <script src="script.js"></script>
</body>
</html>
